<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D Card Wall</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --gold: #c8a050; --gold-dim: rgba(200,160,80,0.28); --bg: #080706; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: var(--bg); font-family: "Noto Serif SC", serif; -webkit-font-smoothing: antialiased; }
    #scene-container { position: fixed; inset: 0; touch-action: none; }
    #scene-container canvas { display: block; }
    #tooltip {
      position: fixed; z-index: 80; pointer-events: none;
      background: rgba(6,5,4,.88); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--gold-dim); border-radius: 8px; padding: 10px 14px;
      opacity: 0; transform: translateY(6px); transition: opacity .18s, transform .18s; max-width: 180px;
    }
    #tooltip.show { opacity: 1; transform: translateY(0); }
    #tooltip-title { font-size: .82rem; font-weight: 700; color: #fff; margin-bottom: 4px; line-height: 1.3; }
    #tooltip-meta { display: flex; align-items: center; gap: 6px; font-size: .68rem; color: rgba(255,255,255,.35); }
  </style>
</head>
<body>
  <div id="scene-container"></div>
  <div id="tooltip">
    <div id="tooltip-title"></div>
    <div id="tooltip-meta">
      <span id="tooltip-id"></span>
    </div>
  </div>

  <script>
    // 占位卡片数据
    var CARD_COLORS = [
      '#1a1a2e','#16213e','#0f3460','#533483','#e94560',
      '#2d3436','#636e72','#b2bec3','#6c5ce7','#a29bfe',
      '#00b894','#00cec9','#0984e3','#6c5ce7','#fdcb6e',
      '#e17055','#d63031','#e84393','#fd79a8','#fab1a0'
    ];
    var CARDS = [];
    for (var i = 0; i < 600; i++) {
      CARDS.push({ id: i, title: 'Card ' + (i+1), color: CARD_COLORS[i % CARD_COLORS.length], seed: String(i) });
    }
  </script>

  <script>
    function initDesktop() {
      'use strict';
      var THREE = window.THREE;

      // 扩展数据
      var allCards = [];
      for (var i = 0; i < 480; i++) {
        var b = CARDS[i % CARDS.length];
        allCards.push({ id: i, title: b.title, color: b.color, seed: b.seed });
      }
      for (var i = allCards.length - 1; i > 0; i--) {
        var j = Math.floor(Math.random() * (i + 1));
        var t = allCards[i]; allCards[i] = allCards[j]; allCards[j] = t;
      }

      var W = window.innerWidth, H = window.innerHeight;
      var scene = new THREE.Scene();
      scene.background = new THREE.Color(0x080706);
      scene.fog = new THREE.Fog(0x080706, 280, 660);

      var camera = new THREE.PerspectiveCamera(72, W/H, 0.1, 2000);
      camera.position.set(0, 0, 0);

      var renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(W, H);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      document.getElementById('scene-container').appendChild(renderer.domElement);

      scene.add(new THREE.AmbientLight(0xffffff, 3.0));

      // 圆柱参数
      var CYL_R  = 210;
      var COLS   = 24;
      var ROWS   = 20;
      var CARD_W = (2 * Math.PI * CYL_R) / COLS * 0.95;
      var CARD_H = CARD_W * 1.5;
      var ROW_H  = CARD_H * 1.05;

      var wallGroup = new THREE.Group();
      scene.add(wallGroup);

      var meshes = [], cardOrigPositions = [];

      // 生成卡片
      for (var row = 0; row < ROWS; row++) {
        for (var col = 0; col < COLS; col++) {
          var idx = row * COLS + col;
          var card = allCards[idx % allCards.length];

          (function(card, row, col) {
            var offset = (row % 2 === 0) ? 0 : (Math.PI / COLS);
            var theta  = (col / COLS) * Math.PI * 2 + offset;

            var px = Math.sin(theta) * CYL_R;
            var pz = Math.cos(theta) * CYL_R;
            var py = (row - (ROWS-1)/2) * ROW_H;

            var geo = new THREE.PlaneGeometry(CARD_W, CARD_H);
            var mat = new THREE.MeshBasicMaterial({ color: 0x222222 });
            var mesh = new THREE.Mesh(geo, mat);
            mesh.position.set(px, py, pz);
            mesh.lookAt(0, py, 0);
            mesh.userData = { card: card };
            wallGroup.add(mesh);
            meshes.push(mesh);
            cardOrigPositions.push(mesh.position.clone());

            // Canvas 纹理
            var cvs = document.createElement('canvas');
            cvs.width = 256; cvs.height = 384;
            var ctx = cvs.getContext('2d');
            var grad = ctx.createLinearGradient(0, 0, cvs.width, cvs.height);
            grad.addColorStop(0, card.color);
            grad.addColorStop(1, '#111111');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, cvs.width, cvs.height);
            ctx.strokeStyle = 'rgba(255,255,255,0.08)';
            ctx.lineWidth = 2;
            ctx.strokeRect(4, 4, cvs.width-8, cvs.height-8);
            ctx.fillStyle = 'rgba(255,255,255,0.25)';
            ctx.font = 'bold 28px "Cinzel", serif';
            ctx.textAlign = 'center';
            ctx.fillText('#' + (card.id + 1), cvs.width/2, cvs.height/2);
            ctx.fillStyle = 'rgba(255,255,255,0.12)';
            ctx.font = '14px "Noto Serif SC", serif';
            ctx.fillText(card.title, cvs.width/2, cvs.height/2 + 40);
            var tex = new THREE.CanvasTexture(cvs);
            tex.colorSpace = THREE.SRGBColorSpace;
            mesh.material.map = tex;
            mesh.material.color.set(0x888888);
            mesh.material.needsUpdate = true;
          })(card, row, col);
        }
      }

      // 发光边框纹理
      var glowCanvas = document.createElement('canvas');
      glowCanvas.width = 512; glowCanvas.height = 768;
      var glowCtx = glowCanvas.getContext('2d');
      var glowTex = new THREE.CanvasTexture(glowCanvas);
      glowTex.colorSpace = THREE.SRGBColorSpace;

      function buildGlowTexture() {
        var c = glowCtx, w = glowCanvas.width, h = glowCanvas.height;
        c.clearRect(0, 0, w, h);
        var grad = c.createRadialGradient(w/2, h/2, w*0.46, w/2, h/2, w*0.53);
        grad.addColorStop(0,    'rgba(226,178,118,0)');
        grad.addColorStop(0.65, 'rgba(226,178,118,0)');
        grad.addColorStop(0.80, 'rgba(226,178,118,0.40)');
        grad.addColorStop(0.93, 'rgba(226,178,118,0.07)');
        grad.addColorStop(1,    'rgba(226,178,118,0)');
        c.fillStyle = grad; c.fillRect(0, 0, w, h);
        glowTex.needsUpdate = true;
      }
      buildGlowTexture();

      var glowGeo = new THREE.PlaneGeometry(CARD_W + 6, CARD_H + 6);
      var glowMat = new THREE.MeshBasicMaterial({ map: glowTex, transparent: true, opacity: 0, depthWrite: false, depthTest: false });
      var glowMesh = new THREE.Mesh(glowGeo, glowMat);
      glowMesh.renderOrder = -1; wallGroup.add(glowMesh);

      var glowOpacity = 0, targetGlowOpacity = 0;
      var cardOffset = 0, targetCardOffset = 0;

      // 交互状态
      var raycaster  = new THREE.Raycaster();
      var mouse      = new THREE.Vector2(-9999, -9999);
      var hoveredIdx = -1;
      var isPaused   = false;
      var isDragging = false;
      var rotY = 0, rotX = 0, targetRotX = 0;
      var camY = 0, targetCamYPreset = 0;
      var presetSpeed = 0.0018;

      var tooltip  = document.getElementById('tooltip');
      var tooltipTitle = document.getElementById('tooltip-title');
      var tooltipId = document.getElementById('tooltip-id');
      var mouseScreenX = 0, mouseScreenY = 0, mouseOnUI = false;
      var dragSpeed = 0, dragStartX = 0, dragStartY = 0, dragLastX = 0;

      // 拖拽
      function beginDrag(sx, sy) {
        isDragging = true; dragStartX = sx; dragStartY = sy; dragLastX = sx; dragSpeed = 0;
      }
      function moveDrag(sx, sy) {
        mouse.x = (sx/W)*2 - 1;
        mouse.y = -(sy/H)*2 + 1;
        mouseScreenX = sx;
        mouseScreenY = sy;
        if (isDragging) { var dx = sx - dragLastX; rotY -= dx * 0.003; dragSpeed = -dx * 0.003; dragLastX = sx; }
      }
      function endDrag(sx, sy) {
        if (!isDragging) return; isDragging = false;
        if (Math.abs(sx - dragStartX) < 3 && Math.abs(sy - dragStartY) < 3) handleClick(sx, sy);
      }

      renderer.domElement.addEventListener('mousedown', function(e) { beginDrag(e.clientX, e.clientY); });
      window.addEventListener('mousemove', function(e) { moveDrag(e.clientX, e.clientY); });
      window.addEventListener('mouseup', function(e) { endDrag(e.clientX, e.clientY); });

      renderer.domElement.addEventListener('touchstart', function(e) {
        if (e.touches.length === 1) { e.preventDefault(); var t = e.touches[0]; beginDrag(t.clientX, t.clientY); }
      }, { passive: false });
      window.addEventListener('touchmove', function(e) {
        if (e.touches.length !== 1) return;
        e.preventDefault();
        var t = e.touches[0]; moveDrag(t.clientX, t.clientY);
      }, { passive: false });
      window.addEventListener('touchend', function(e) {
        var t = e.changedTouches[0];
        if (t) endDrag(t.clientX, t.clientY);
      });

      // 点击处理
      function handleClick(cx, cy) {
        if (isPaused) return;
        var m2 = new THREE.Vector2((cx/W)*2-1, -(cy/H)*2+1);
        raycaster.setFromCamera(m2, camera);
        var hits = raycaster.intersectObjects(meshes);
        if (hits.length > 0 && hits[0].object.userData.card) {
          var card = hits[0].object.userData.card;
          var mesh = hits[0].object;
          var origColor = mesh.material.color.getHex();
          mesh.material.color.set(0xffffff);
          setTimeout(function() { mesh.material.color.setHex(origColor); }, 200);
        }
      }

      // Hover 更新
      function updateHover() {
        raycaster.setFromCamera(mouse, camera);
        var hits = raycaster.intersectObjects(meshes);
        var prevHovered = hoveredIdx;

        if (!isDragging && hits.length > 0) {
          var hIdx = meshes.indexOf(hits[0].object);
          if (hIdx !== hoveredIdx) {
            hoveredIdx = hIdx;
            targetGlowOpacity = 1;
            targetCardOffset = 18;
          }
        } else if (!isDragging) {
          hoveredIdx = -1;
          targetGlowOpacity = 0;
          targetCardOffset = 0;
        }

        // Tooltip
        if (hoveredIdx >= 0 && hoveredIdx !== prevHovered) {
          var m = meshes[hoveredIdx];
          if (m && m.userData.card) {
            var cd = m.userData.card;
            tooltipTitle.textContent = cd.title;
            tooltipId.textContent = '#' + (cd.id + 1);
            tooltip.classList.add('show');
          }
        } else if (hoveredIdx < 0) {
          tooltip.classList.remove('show');
        }

        if (hoveredIdx >= 0) {
          tooltip.style.left = (mouseScreenX + 22) + 'px';
          tooltip.style.top  = (mouseScreenY - 50) + 'px';
        }
      }

      // 动画循环
      function animate() {
        requestAnimationFrame(animate);
        if (!isPaused) {
          if (!isDragging && dragSpeed !== 0) { dragSpeed *= 0.97; if (Math.abs(dragSpeed) < 1e-7) dragSpeed = 0; }
          var spd = isDragging ? 0 : presetSpeed + dragSpeed;
          rotY += spd;
          rotX += (targetRotX - rotX) * 0.008;
          wallGroup.rotation.y = rotY;
          wallGroup.rotation.x = rotX;
        }
        glowOpacity += (targetGlowOpacity - glowOpacity) * 0.1;
        glowMat.opacity = glowOpacity * 0.6;
        cardOffset += (targetCardOffset - cardOffset) * 0.12;
        if (hoveredIdx >= 0 && cardOffset > 0.1) {
          var card = meshes[hoveredIdx];
          var orig = cardOrigPositions[hoveredIdx];
          var dir = orig.clone().normalize();
          card.position.copy(orig).add(dir.clone().multiplyScalar(-cardOffset));
          glowMesh.position.copy(card.position);
          glowMesh.lookAt(0, card.position.y, 0);
        } else if (hoveredIdx >= 0) {
          meshes[hoveredIdx].position.copy(cardOrigPositions[hoveredIdx]);
        }
        camY += (targetCamYPreset - camY) * 0.05;
        camera.position.y = camY;
        updateHover();
        renderer.render(scene, camera);
      }
      animate();

      window.addEventListener('resize', function() {
        W = window.innerWidth; H = window.innerHeight;
        camera.aspect = W/H; camera.updateProjectionMatrix(); renderer.setSize(W, H);
      });
    }
  </script>

  <script>
    (function(){
      var s = document.createElement('script');
      s.src = 'https://cdn.jsdelivr.net/npm/three@0.157.0/build/three.min.js';
      s.onload = function(){ initDesktop(); };
      s.onerror = function(){ console.error('Three.js load failed'); };
      document.head.appendChild(s);
    })();
  </script>
</body>
</html>
